function highlightMap(stationName) {
    activeStation = stationName;

    var connectedStations = new Set();
    connectedStations.add(stationName);

        }

    });

    });

function bindStationEvents() {

            highlightMap(item.name);

        });

            resetMap();
        });

            }

    });
}

            return JSON.stringify(feature);

        `<tr>
            <th>${aliases[i].toLocaleString()}</th>
            
            <td>${handleObject(layer.feature.properties[v]).toLocaleString()}</td>
        </tr>`).join(''))
    +'</table>';
    div.innerHTML=table;
    
    return div
    }
